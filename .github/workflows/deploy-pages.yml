# Builds dist/ and publishes to GitHub Pages (Actions artifact + docs/ fallback).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          BASE_PATH: /stunning-tribble/

      - name: Verify production bundle (not raw /src/main.js)
        shell: bash
        run: |
          grep -q '/stunning-tribble/assets/' dist/index.html
          if grep -q '/src/main.js' dist/index.html; then
            echo 'dist/index.html still references dev entry /src/main.js'
            exit 1
          fi

      - name: Sync built site to site/ for branch-based Pages fallback
        run: |
          rm -rf site
          mkdir -p site
          cp -r dist/. site/

      - name: Commit site/ if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync GitHub Pages build to site/'
          file_pattern: site/**

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
