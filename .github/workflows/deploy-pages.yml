# Builds dist/ and publishes to GitHub Pages.
# Also commits production index.html + assets/ to repo root on main, because
# pages-build-deployment serves the branch root (not only the Actions artifact).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'index.html'
      - '.nojekyll'
      - 'index.source.html'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          BASE_PATH: /stunning-tribble/

      - name: Normalize dist/index.html from Vite source entry
        run: cp dist/index.source.html dist/index.html

      - name: Verify production bundle (not raw /src/main.js)
        shell: bash
        run: |
          grep -q '/stunning-tribble/assets/' dist/index.html
          if grep -q '/src/main.js' dist/index.html; then
            echo 'dist/index.html still references dev entry /src/main.js'
            exit 1
          fi

      - name: Sync built site to repository root for branch Pages deploy
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/.nojekyll .nojekyll

      - name: Commit production root files if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync production index.html and assets for GitHub Pages'
          file_pattern: index.html assets/** .nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
